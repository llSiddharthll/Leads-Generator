name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/Leads-Generator
            git pull origin main
            ./venv/bin/pip install -r requirements.txt --quiet
            systemctl restart leads-generator
            sleep 3
            curl -sf http://127.0.0.1:8001/health || (echo "Health check failed!" && exit 1)
            echo "Deployment successful!"

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify deployment health
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf http://${{ secrets.SERVER_HOST }}/health 2>/dev/null || echo "failed")
            if echo "$STATUS" | grep -q '"ok"'; then
              echo "Health check passed: $STATUS"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1
