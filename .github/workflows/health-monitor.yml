name: Server Health Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check server health
        run: |
          STATUS=$(curl -sf --max-time 10 http://${{ secrets.SERVER_HOST }}/health 2>/dev/null || echo "failed")
          if echo "$STATUS" | grep -q '"ok"'; then
            echo "Server is healthy: $STATUS"
          else
            echo "SERVER IS DOWN! Response: $STATUS"
            exit 1
          fi

      - name: Restart server if down
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            systemctl restart leads-generator
            sleep 5
            curl -sf http://127.0.0.1:8001/health && echo "Server recovered!" || echo "Server still down after restart"
